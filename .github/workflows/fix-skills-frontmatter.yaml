name: Validate and Fix Skill Frontmatter

on:
  push:
    branches: [main]
    paths:
      - '**/SKILL.md'
      - 'scripts/validate-skill-frontmatter.sh'
      - '.github/workflows/fix-skills-frontmatter.yaml'
  pull_request:
    paths:
      - '**/SKILL.md'
  workflow_dispatch:
    inputs:
      auto_fix:
        description: 'Run Copilot CLI to auto-fix broken frontmatter'
        type: boolean
        default: true

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: fix-skills-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    name: Validate Skill Frontmatter
    runs-on: ubuntu-latest
    outputs:
      broken_count: ${{ steps.scan.outputs.broken_count }}
      broken_files: ${{ steps.scan.outputs.broken_files }}
    steps:
      - uses: actions/checkout@v4

      - name: Scan SKILL.md files
        id: scan
        run: |
          set +e
          # Only list errors (not warnings) for the auto-fix loop; warnings
          # are advisory and shouldn't trigger Copilot runs.
          ./scripts/validate-skill-frontmatter.sh --quiet > /tmp/broken.txt
          rc=$?
          # Filter blank lines defensively
          sed -i '/^$/d' /tmp/broken.txt || true
          count=$(wc -l < /tmp/broken.txt | tr -d ' ')
          echo "broken_count=$count" >> "$GITHUB_OUTPUT"
          files=$(tr '\n' ' ' < /tmp/broken.txt | sed 's/ $//')
          echo "broken_files<<EOF" >> "$GITHUB_OUTPUT"
          echo "$files" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
          echo "Found $count file(s) with errors (validator exit: $rc)"
          if [ "$count" -gt 0 ]; then
            echo "::warning title=Skill frontmatter errors::$count SKILL.md file(s) need fixes"
            # Print the full human-readable report to the job log
            ./scripts/validate-skill-frontmatter.sh || true
          fi
          exit 0

      - name: Write job summary
        run: |
          {
            echo "## Skill Frontmatter Validation"
            echo ""
            if [ "${{ steps.scan.outputs.broken_count }}" = "0" ]; then
              echo "✅ All \`SKILL.md\` files have valid frontmatter."
            else
              echo "❌ Found **${{ steps.scan.outputs.broken_count }}** file(s) with invalid frontmatter:"
              echo ""
              echo '```'
              ./scripts/validate-skill-frontmatter.sh || true
              echo '```'
            fi
          } >> "$GITHUB_STEP_SUMMARY"

  fix:
    name: Auto-fix with Copilot CLI (Opus 4.7)
    needs: validate
    if: >-
      needs.validate.outputs.broken_count != '0' &&
      (github.event_name == 'push' ||
       github.event_name == 'pull_request' ||
       (github.event_name == 'workflow_dispatch' && inputs.auto_fix))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Use PAT when available so the pushed commit can retrigger workflows
          # (release-agents.yaml, Context7 sync). Falls back to GITHUB_TOKEN.
          token: ${{ secrets.AUTOFIX_PUSH_TOKEN || secrets.GITHUB_TOKEN }}
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install GitHub Copilot CLI
        run: |
          npm install -g @github/copilot
          copilot --version

      - name: Fix broken skills with Copilot (Claude Opus 4.7)
        env:
          # COPILOT_CLI_TOKEN must be a PAT from an account with an active
          # Copilot subscription that has CLI access. Stored as a repo secret.
          GH_TOKEN: ${{ secrets.COPILOT_CLI_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.COPILOT_CLI_TOKEN }}
          BROKEN_FILES: ${{ needs.validate.outputs.broken_files }}
        run: |
          set -e
          if [ -z "$GH_TOKEN" ]; then
            echo "::error::COPILOT_CLI_TOKEN secret not set; cannot run Copilot CLI."
            echo "Add a PAT with Copilot access as COPILOT_CLI_TOKEN secret."
            exit 1
          fi

          mkdir -p .copilot-logs

          for f in $BROKEN_FILES; do
            echo "::group::Fixing $f"
            dir_name="$(basename "$(dirname "$f")")"

            # Per-file diagnostic from our validator so Copilot knows exactly
            # which error(s) to fix (not just "something is wrong").
            diag="$(./scripts/validate-skill-frontmatter.sh 2>&1 | \
                    awk -v f="$f" '
                      /^  \[/       { reason=$0 }
                      $0 ~ f        { in_entry=1; print reason; print "    "$0; next }
                      in_entry && /^    → / { print; in_entry=0 }
                    ')"

            prompt=$(cat <<EOF
Fix the YAML frontmatter of the Agent Skill file at: $f

Current validator findings for this file:
$diag

The Agent Skills spec (https://agentskills.io/specification) REQUIRES:

  name:        string matching regex ^[a-z0-9]+(-[a-z0-9]+)*$ (lowercase
               alphanumeric + hyphens, no leading/trailing/consecutive
               hyphens), 1-64 chars. MUST EXACTLY EQUAL the parent
               directory name, which is: "$dir_name"
               (VS Code / GitHub Copilot Chat silently drops skills whose
               name does not match the directory, so this is non-negotiable)

  description: string, 1-1024 chars, ideally 50-300 chars. Must describe
               BOTH what the skill does AND when an agent should use it.
               Write in third person, imperative mood, no XML tags, no
               "I"/"you" voice. This is what agents read to decide
               relevance — it must be specific and useful, not generic.

Optional fields you may preserve if already present (but do NOT add them
unless the content clearly warrants it):
  license, metadata, compatibility, agents, triggers, llm_docs_url

DO NOT add these Claude-Code-only fields (non-portable):
  allowed-tools, model

Rules:
1. Use the Read tool to inspect $f first.
2. If frontmatter is missing entirely, PREPEND a valid \`---\` YAML block
   followed by a blank line, then the existing content unchanged.
3. If frontmatter exists, ADD or CORRECT only the fields the validator
   flagged. Do not reorder or remove fields that are already present.
4. If the current \`name\` field doesn't match "$dir_name", change it to
   "$dir_name" exactly (the directory name is authoritative).
5. Infer the description from the file's first heading, opening paragraph,
   or "## Overview" / "## WHAT" section. Target 80-200 chars.
6. Preserve ALL body content below the frontmatter byte-for-byte.
7. Use the Edit tool (or Write if creating the header is easier) to apply
   the change. Do not output a summary — just fix the file.
EOF
)

            copilot \
              --model claude-opus-4.7 \
              --allow-all-tools \
              --no-confirm \
              -p "$prompt" 2>&1 | tee ".copilot-logs/$(echo "$f" | tr '/' '_').log"

            # Per-file quick verification (full re-validation happens later)
            if ./scripts/validate-skill-frontmatter.sh --quiet 2>/dev/null | \
                 grep -qxF "$f"; then
              echo "::warning file=$f::Copilot run completed but file is still invalid"
            else
              echo "  ✅ Fixed"
            fi
            echo "::endgroup::"
          done

      - name: Re-validate after fixes
        id: revalidate
        run: |
          set +e
          ./scripts/validate-skill-frontmatter.sh
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"

      - name: Commit and push fixes
        id: commit
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --staged --quiet; then
            echo "No changes to commit."
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          count=$(git diff --staged --name-only | wc -l | tr -d ' ')
          msg="fix(skills): auto-repair frontmatter in $count SKILL.md file(s)

Fixed by GitHub Copilot CLI using Claude Opus 4.7, following the Agent
Skills spec (required: name, description).

Co-authored-by: Copilot <223556219+Copilot@users.noreply.github.com>"

          git commit -m "$msg"

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git push origin HEAD:"${{ github.head_ref }}"
          else
            git push
          fi
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Upload Copilot logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: copilot-fix-logs
          path: .copilot-logs/
          retention-days: 14

      - name: Refresh Context7 index
        if: >-
          steps.commit.outputs.changed == 'true' &&
          github.event_name != 'pull_request'
        env:
          CONTEXT7_API_KEY: ${{ secrets.CONTEXT7_API_KEY }}
        run: |
          if [ -z "$CONTEXT7_API_KEY" ]; then
            echo "::notice::CONTEXT7_API_KEY not set — skipping Context7 refresh."
            exit 0
          fi
          echo "Requesting Context7 re-index of /5dlabs/cto-agents ..."
          # Retry up to 3× in case another refresh is already in progress.
          for i in 1 2 3; do
            resp=$(curl -s -o /tmp/refresh.json -w '%{http_code}' \
              -X POST "https://context7.com/api/v1/refresh" \
              -H "Authorization: Bearer $CONTEXT7_API_KEY" \
              -H "Content-Type: application/json" \
              -d '{"libraryName":"/5dlabs/cto-agents"}')
            cat /tmp/refresh.json; echo
            if [ "$resp" = "200" ]; then
              echo "✅ Context7 refresh triggered."
              exit 0
            fi
            if grep -q user-has-active-task /tmp/refresh.json; then
              echo "Another task is in progress; waiting 60s before retry $i/3 ..."
              sleep 60
              continue
            fi
            echo "::warning::Context7 refresh returned HTTP $resp"
            break
          done
          # Non-fatal: don't fail the whole workflow because of re-index issues
          exit 0

      - name: Fail if any file remains invalid
        if: steps.revalidate.outputs.exit_code != '0'
        run: |
          echo "::error::Some files still have invalid frontmatter after auto-fix."
          echo "Review the copilot-fix-logs artifact and fix manually."
          exit 1
