name: Release Skills

on:
  push:
    branches: [main]
    paths:
      - '**/*.md'
      - '**/SKILL.md'
      - 'skill-mappings.yaml'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build per-skill tarballs and hashes
        run: |
          mkdir -p dist staging

          # Walk {agent}/{project}/{skill}/ directories
          # Structure: {agent}/{project}/{skill}/SKILL.md (+ optional extra files)
          for agent_dir in */; do
            agent=$(basename "$agent_dir")

            # Skip dotfiles and non-agent dirs
            [[ "$agent" == .* ]] && continue
            [ ! -d "$agent_dir" ] && continue

            for project_dir in "$agent_dir"*/; do
              project=$(basename "$project_dir")
              [ ! -d "$project_dir" ] && continue

              for skill_dir in "$project_dir"*/; do
                skill_name=$(basename "$skill_dir")
                [ ! -d "$skill_dir" ] && continue

                # Must have SKILL.md
                if [ ! -f "$skill_dir/SKILL.md" ]; then
                  echo "WARN: $skill_dir has no SKILL.md, skipping"
                  continue
                fi

                # Stage skill files under {skill_name}/ for tarball
                # If this skill was already staged (from another agent), skip
                # (first agent wins — skills are identical across agents)
                if [ ! -d "staging/$skill_name" ]; then
                  cp -r "$skill_dir" "staging/$skill_name"
                  echo "Staged: $agent/$project/$skill_name ($(ls "staging/$skill_name" | wc -l | tr -d ' ') files)"
                fi
              done
            done
          done

          # Build tarballs from staging
          cd staging
          for skill_dir in */; do
            skill_name=$(basename "$skill_dir")
            tar czf "../dist/${skill_name}.tar.gz" "$skill_name"
          done
          cd ..

          # Generate hashes.txt manifest
          cd dist
          sha256sum *.tar.gz > hashes.txt
          echo ""
          echo "=== hashes.txt ==="
          cat hashes.txt
          echo ""
          echo "Total skills packaged: $(wc -l < hashes.txt)"

      - name: Delete existing latest release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete latest --yes 2>/dev/null || true
          git push origin :refs/tags/latest 2>/dev/null || true

      - name: Create rolling latest release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create latest \
            --title "Latest Skills Release" \
            --notes "Auto-published on $(date -u +%Y-%m-%dT%H:%M:%SZ) from commit $(git rev-parse --short HEAD).

          Contains $(ls dist/*.tar.gz | wc -l) per-skill tarballs + \`hashes.txt\` manifest.

          The CTO controller fetches \`hashes.txt\` and downloads only changed skills." \
            --latest \
            dist/*
