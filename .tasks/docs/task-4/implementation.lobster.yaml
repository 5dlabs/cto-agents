name: implement-task-4
metadata:
  task_id: 4
  agent: rex
  stack: Rust 1.75+/Axum 0.7
  cli: claude
  model: claude-opus-4-6
  depends_on_tasks: [1]

args:
  task_dir: {}
  repo_url: {}
  branch_name:
    default: "task-4/feature-branch"
  agent:
    default: "rex"
  cli:
    default: "claude"
  model:
    default: "claude-opus-4-6"
  fallback_cli:
    default: "codex"
  fallback_model:
    default: "gpt-5.2-codex"
  max_implementation_retries:
    default: 10
  max_quality_retries:
    default: 5

steps:
  - id: setup
    command: >
      git clone ${repo_url} work && cd work &&
      git checkout -b ${branch_name}

  - id: implement-subtask-4001
    depends_on: [setup]
    retry: { max: "${max_implementation_retries}" }
    command: >
      ${cli} -p "$(cat ${task_dir}/subtasks/task-4.4001/prompt.md)" --model ${model}

  - id: validate-subtask-4001
    depends_on: [implement-subtask-4001]
    retry: { max: "${max_quality_retries}" }
    command: >
      cd work && cargo check && cargo test && cargo clippy -- -D warnings

  - id: implement-subtask-4002
    depends_on: [validate-subtask-4001]
    retry: { max: "${max_implementation_retries}" }
    command: >
