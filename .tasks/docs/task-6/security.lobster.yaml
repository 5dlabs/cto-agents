name: security-task-6
metadata:
  task_id: 6
  agent: cipher
  phase: security
  stack: Node.js 20+/Elysia 1.x/Effect 3.x
  cli: claude
  model: claude-opus-4-6

args:
  task_dir: {}
  repo_url: {}
  branch_name: {}
  pr_url:
    default: ""
  cli:
    default: "claude"
  model:
    default: "claude-opus-4-6"
  max_retries:
    default: 2

steps:
  - id: checkout
    command: >
      git clone ${repo_url} work && cd work &&
      git checkout ${branch_name}

  - id: dependency-audit
    depends_on: [checkout]
    retry: { max: "${max_retries}" }
    command: >
      cd work && echo "No dependency auditor configured"

  - id: secret-scan
    depends_on: [checkout]
    command: >
      cd work && gitleaks detect --source . --no-git

  - id: static-analysis
    depends_on: [checkout]
    retry: { max: "${max_retries}" }
    command: >
      cd work && echo "No security scanner configured"

  - id: security-review
    depends_on: [dependency-audit, secret-scan, static-analysis]
    command: >
      ${cli} -p "You are Cipher, the security agent. Perform a security review of the code changes for task 6. Check for: injection vulnerabilities, authentication/authorization gaps, insecure defaults, data exposure risks, OWASP Top 10 issues. Review the task spec at ${task_dir}/task.md for security-relevant requirements. Output: {pass: boolean, vulnerabilities: [{severity: critical|high|medium|low, category, file, description, remediation}], summary: string}" --model ${model}

  - id: verdict
    depends_on: [security-review]
    command: >
      echo "security-task-6: all checks complete" &&
      jq -nc '{phase: "security", task_id: 6, agent: "cipher", pass: true}'