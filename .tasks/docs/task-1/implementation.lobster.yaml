name: implement-task-1
metadata:
  task_id: 1
  agent: bolt
  stack: Kubernetes/Helm
  cli: codex
  model: gpt-5.2-codex

args:
  task_dir: {}
  repo_url: {}
  branch_name:
    default: "task-1/feature-branch"
  agent:
    default: "bolt"
  cli:
    default: "codex"
  model:
    default: "gpt-5.2-codex"
  fallback_cli:
    default: "claude"
  fallback_model:
    default: "claude-opus-4-6"
  max_implementation_retries:
    default: 10
  max_quality_retries:
    default: 5

steps:
  - id: setup
    command: >
      git clone ${repo_url} work && cd work &&
      git checkout -b ${branch_name}

  - id: implement-subtask-1001
    depends_on: [setup]
    retry: { max: "${max_implementation_retries}" }
    command: >
      ${cli} -p "$(cat ${task_dir}/subtasks/task-1.1001/prompt.md)" --model ${model}

  - id: validate-subtask-1001
    depends_on: [implement-subtask-1001]
    retry: { max: "${max_quality_retries}" }
    command: >
      cd work && kubectl apply --dry-run=client -f . && helm template . | kubeval && yamllint .

  - id: implement-subtask-1002
    depends_on: [validate-subtask-1001]
    retry: { max: "${max_implementation_retries}" }
    command: >
      ${cli} -p "$(cat ${task_dir}/subtasks/task-1.1002/prompt.md)" --model ${model}

  - id: validate-subtask-1002
    depends_on: [implement-subtask-1002]
    retry: { max: "${max_quality_retries}" }
    command: >
      cd work && kubectl apply --dry-run=client -f . && helm template . | kubeval && yamllint .

  - id: implement-subtask-1003
    depends_on: [validate-subtask-1002]
    retry: { max: "${max_implementation_retries}" }
    command: >
      ${cli} -p "$(cat ${task_dir}/subtasks/task-1.1003/prompt.md)" --model ${model}

  - id: validate-subtask-1003
    depends_on: [implement-subtask-1003]
    retry: { max: "${max_quality_retries}" }
    command: >
      cd work && kubectl apply --dry-run=client -f . && helm template . | kubeval && yamllint .

  - id: implement-subtask-1004
    depends_on: [validate-subtask-1001]
    retry: { max: "${max_implementation_retries}" }
    command: >
      ${cli} -p "$(cat ${task_dir}/subtasks/task-1.1004/prompt.md)" --model ${model}

  - id: validate-subtask-1004
    depends_on: [implement-subtask-1004]
    retry: { max: "${max_quality_retries}" }
    command: >
      cd work && kubectl apply --dry-run=client -f . && helm template . | kubeval && yamllint .

  - id: implement-subtask-1005
    depends_on: [validate-subtask-1001]
    retry: { max: "${max_implementation_retries}" }
    command: >
      ${cli} -p "$(cat ${task_dir}/subtasks/task-1.1005/prompt.md)" --model ${model}

  - id: validate-subtask-1005
    depends_on: [implement-subtask-1005]
    retry: { max: "${max_quality_retries}" }
    command: >
      cd work && kubectl apply --dry-run=client -f . && helm template . | kubeval && yamllint .

  - id: implement-subtask-1006
    depends_on: [validate-subtask-1001]
    retry: { max: "${max_implementation_retries}" }
    command: >
      ${cli} -p "$(cat ${task_dir}/subtasks/task-1.1006/prompt.md)" --model ${model}

  - id: validate-subtask-1006
    depends_on: [implement-subtask-1006]
    retry: { max: "${max_quality_retries}" }
    command: >
      cd work && kubectl apply --dry-run=client -f . && helm template . | kubeval && yamllint .

  - id: implement-subtask-1007
    depends_on: [validate-subtask-1002, validate-subtask-1004, validate-subtask-1006]
    retry: { max: "${max_implementation_retries}" }
    command: >
      ${cli} -p "$(cat ${task_dir}/subtasks/task-1.1007/prompt.md)" --model ${model}

  - id: validate-subtask-1007
    depends_on: [implement-subtask-1007]
    retry: { max: "${max_quality_retries}" }
    command: >
      cd work && kubectl apply --dry-run=client -f . && helm template . | kubeval && yamllint .

  - id: implement-subtask-1008
    depends_on: [validate-subtask-1003, validate-subtask-1005, validate-subtask-1007]
    retry: { max: "${max_implementation_retries}" }
    command: >
      ${cli} -p "$(cat ${task_dir}/subtasks/task-1.1008/prompt.md)" --model ${model}

  - id: validate-subtask-1008
    depends_on: [implement-subtask-1008]
    retry: { max: "${max_quality_retries}" }
    command: >
      cd work && kubectl apply --dry-run=client -f . && helm template . | kubeval && yamllint .

  - id: integration-validation
    depends_on: [validate-subtask-1001, validate-subtask-1002, validate-subtask-1003, validate-subtask-1004, validate-subtask-1005, validate-subtask-1006, validate-subtask-1007, validate-subtask-1008]
    command: >
      cd work && bun tsc --noEmit && bun test --run && bun lint

  - id: acceptance-check
    depends_on: [integration-validation]
    command: >
      ${cli} -p "Review changes against ${task_dir}/acceptance.md. Output PASS or FAIL." --model ${model}

  - id: create-pr
    depends_on: [acceptance-check]
    command: >
      cd work && git add -A &&
      git commit -m "feat: task-1" &&
      git push origin ${branch_name} &&
      source "${WORKSPACE:-.}/scripts/scm-dispatch.sh" &&
      scm_create_pr "feat: task-1" "$(cat ${task_dir}/task.md)" "main"