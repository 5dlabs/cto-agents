name: implement-task-9
metadata:
  task_id: 9
  agent: tap
  stack: Expo/React Native/NativeWind 4/Effect 3.x
  cli: cursor
  model: opus-4.6
  depends_on_tasks: [2, 7]

args:
  task_dir: {}
  repo_url: {}
  branch_name:
    default: "task-9/feature-branch"
  agent:
    default: "tap"
  cli:
    default: "cursor"
  model:
    default: "opus-4.6"
  fallback_cli:
    default: "claude"
  fallback_model:
    default: "claude-opus-4-6"
  max_implementation_retries:
    default: 10
  max_quality_retries:
    default: 5

steps:
