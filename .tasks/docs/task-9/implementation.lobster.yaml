    command: >
      git clone ${repo_url} work && cd work &&
      git checkout -b ${branch_name}

  - id: implement-subtask-9001
    depends_on: [setup]
    retry: { max: "${max_implementation_retries}" }
    command: >
      ${cli} -p "$(cat ${task_dir}/subtasks/task-9.9001/prompt.md)" --model ${model}

  - id: validate-subtask-9001
    depends_on: [implement-subtask-9001]
    retry: { max: "${max_quality_retries}" }
    command: >
      cd work && bun tsc --noEmit && bun test && bun lint

