name: implement-task-10
metadata:
  task_id: 10
  agent: bolt
  stack: Kubernetes/Helm/Cilium
  cli: codex
  model: gpt-5.2-codex
  depends_on_tasks: [2, 3, 4, 5, 6, 7, 8, 9]

args:
  task_dir: {}
  repo_url: {}
  branch_name:
    default: "task-10/feature-branch"
  agent:
    default: "bolt"
  cli:
    default: "codex"
  model:
    default: "gpt-5.2-codex"
  fallback_cli:
    default: "claude"
  fallback_model:
    default: "claude-opus-4-6"
  max_implementation_retries:
    default: 10
  max_quality_retries:
    default: 5

steps:
  - id: setup
    command: >
      git clone ${repo_url} work && cd work &&
      git checkout -b ${branch_name}

  - id: implement-subtask-10001
    depends_on: [setup]
    retry: { max: "${max_implementation_retries}" }
    command: >
      ${cli} -p "$(cat ${task_dir}/subtasks/task-10.10001/prompt.md)" --model ${model}

  - id: validate-subtask-10001
    depends_on: [implement-subtask-10001]
    retry: { max: "${max_quality_retries}" }
    command: >
      cd work && kubectl apply --dry-run=client -f . && helm template . | kubeval && yamllint .

  - id: implement-subtask-10002
