name: play
description: >
  Master play workflow orchestrated by Morgan.
  Dispatches implementation agents per-task via CodeRun CRDs,
  then fans out quality/security/testing checks before gating.
  Morgan selects CLI and provider per-task based on difficulty,
  available credits, and user-defined provider preferences.

args:
  tasks_dir:
    description: Root directory containing per-task folders
  repo_url:
  namespace:
    default: openclaw
  base_branch:
    default: main
  cli:
    description: Default CLI tool (claude, codex, cursor, gemini, etc.)
    default: claude
  model:
    description: Default LLM model — Morgan may override per-task based on difficulty + credits
    default: claude-sonnet-4-6
  linear_session_id:
    description: Linear agent session for status updates
    default: ""
  linear_team_id:
    default: ""
  docs_repository_url:
    default: ""
  enable_docker:
    default: "true"
  discord_channel:
    description: Discord target channel for play notifications (e.g. play, execution)
    default: "play"

steps:

  # ── Play start notification ──
  - id: notify-play-start
    command: |
      echo '🎬 Play started — 10 tasks dispatching' | intake-util bridge-notify --from morgan --to ${discord_channel} --metadata '{"step":"play-start","task_count":10,"time_utc":"$(date -u +%Y-%m-%dT%H:%M:%SZ)"}' || true
      LINEAR_SID="${linear_session_id}"
      [ -n "$LINEAR_SID" ] && intake-util linear-activity --session-id "$LINEAR_SID" --type action --body '## 🎬 Play Started\n\n10 tasks dispatching to 3 harnesses.\n\n| Task | Title | Agent | CLI | Model | Type |\n|------|-------|-------|-----|-------|------|\n| 1 | Provision Core Infrastructure (Bolt - Ku | bolt | codex | gpt-5.2-codex | infra |\n| 2 | Build Equipment Catalog Service (Rex - R | rex | claude | claude-opus-4-6 | task |\n| 3 | Build Rental Management System Service ( | grizz | codex | gpt-5.2-codex | task |\n| 4 | Build Finance Service (Rex - Rust/Axum) | rex | claude | claude-opus-4-6 | task |\n| 5 | Build Customer Vetting Service (Rex - Ru | rex | claude | claude-opus-4-6 | task |\n| 6 | Build Social Media Engine (Nova - Node.j | nova | claude | claude-opus-4-6 | task |\n| 7 | Configure Morgan AI Agent (Angie - OpenC | angie | claude | claude-opus-4-6 | task |\n| 8 | Build Sigma-1 Website (Blaze - Next.js 1 | blaze | cursor | opus-4.6 | task |\n| 9 | Build Sigma-1 Mobile App (Tap - Expo/Rea | tap | cursor | opus-4.6 | task |\n| 10 | Production Hardening & Security (Bolt -  | bolt | codex | gpt-5.2-codex | infra |' >/dev/null || true


  # ── Task 1: Provision Core Infrastructure (Bolt - Kubernetes/Helm) (infra, agent: bolt, cli: codex, model: gpt-5.2-codex, difficulty: 5) ──
  - id: notify-task-1-start
    command: |
      echo '🚀 Task 1: Provision Core Infrastructure (Bolt - Kubernete... → codex (gpt-5.2-codex) — agent: bolt' | intake-util bridge-notify --from bolt --to ${discord_channel} --metadata '{"step":"task-dispatch","task_id":1,"agent":"bolt","cli":"codex","model":"gpt-5.2-codex","task_type":"infra"}' || true
      LINEAR_SID="${linear_session_id}"
      [ -n "$LINEAR_SID" ] && intake-util linear-activity --session-id "$LINEAR_SID" --type action --body '## 🚀 Task 1 Dispatched\n\n**Provision Core Infrastructure (Bolt - Kubernetes/Helm)**\n- Agent: `bolt`\n- CLI: `codex` / Model: `gpt-5.2-codex`\n- Type: infra | Difficulty: 5\n- Subtasks: 8' >/dev/null || true

  - id: run-task-1
    depends_on: [notify-task-1-start]
    command: |
      # --- Primary attempt: codex/gpt-5.2-codex ---
      PRIMARY_CLI="codex"
      PRIMARY_MODEL="gpt-5.2-codex"
      FALLBACK_CLI="claude"
      FALLBACK_MODEL="claude-opus-4-6"
      TASK_ID=1
      AGENT="bolt"
      NS="${namespace}"
      RUN_NAME="play-task-1-bolt"
      USED_CLI="$PRIMARY_CLI"
      USED_MODEL="$PRIMARY_MODEL"

      apply_coderun() {
        local cli="$1" model="$2" run_name="$3"
        cat <<CODERUN_EOF | envsubst | kubectl apply -f -
      apiVersion: agents.platform/v1
      kind: CodeRun
      metadata:
        name: $run_name
        namespace: $NS
        labels:
          cto.5dlabs.ai/play: "true"
          cto.5dlabs.ai/task-id: "1"
          cto.5dlabs.ai/agent: "bolt"
          cto.5dlabs.ai/task-type: "infra"
          cto.5dlabs.ai/cli: "$cli"
      spec:
        runType: implementation
        taskId: 1
        service: bolt
        repositoryUrl: ${repo_url}
        docsRepositoryUrl: ${docs_repository_url}
        model: $model
        githubApp: 5DLabs-Bolt
        enableDocker: ${enable_docker}
        cliConfig:
          cliType: $cli
          model: $model
        linearIntegration:
          enabled: true
          sessionId: ${linear_session_id}
          teamId: ${linear_team_id}
        subtasks:
          - id: 1001
            title: "Create Kubernetes namespaces: sigma1, databases, openclaw, signal"
            parallelizable: false
          - id: 1002
            title: "Deploy CloudNative-PG PostgreSQL 16 Cluster CR (sigma1-postgres)"
            parallelizable: false
            dependencies: ["1001"]
          - id: 1003
            title: "Run post-cluster schema init Job: create six schemas and per-service roles"
            parallelizable: false
            dependencies: ["1002"]
          - id: 1004
            title: "Deploy Opstree Valkey 7.2 single-replica instance (sigma1-valkey)"
            parallelizable: true
            dependencies: ["1001"]
          - id: 1005
            title: "Create all nine Kubernetes Secrets in the sigma1 namespace"
            parallelizable: true
            dependencies: ["1001"]
          - id: 1006
            title: "Deploy Signal-CLI pod, PVC, and ClusterIP Service in the signal namespace"
            parallelizable: true
            dependencies: ["1001"]
          - id: 1007
            title: "Create sigma1-infra-endpoints ConfigMap aggregating all connection strings"
            parallelizable: false
            dependencies: ["1002", "1004", "1006"]
          - id: 1008
            title: "Apply ArgoCD Application CR for the sigma1/infra Helm chart and validate full stack"
            parallelizable: false
            dependencies: ["1003", "1005", "1007"]
      CODERUN_EOF
      }

      wait_coderun() {
        local run_name="$1"
        kubectl wait "coderun/$run_name" -n "$NS" \
          --for=jsonpath='{.status.phase}'=Succeeded \
          --timeout=3600s
      }

      # Primary attempt
      echo "Submitting CodeRun $RUN_NAME ($PRIMARY_CLI/$PRIMARY_MODEL)..." &&
      apply_coderun "$PRIMARY_CLI" "$PRIMARY_MODEL" "$RUN_NAME" &&
      if wait_coderun "$RUN_NAME"; then
        echo "task-1 implementation complete ($PRIMARY_CLI/$PRIMARY_MODEL)"
      else
        # --- Fallback attempt: claude/claude-opus-4-6 ---
        FALLBACK_RUN="play-task-1-bolt-fallback"
        USED_CLI="$FALLBACK_CLI"
        USED_MODEL="$FALLBACK_MODEL"
        echo "⚠️ Primary $PRIMARY_CLI failed for task-1, falling back to $FALLBACK_CLI/$FALLBACK_MODEL..." &&
        echo '⚠️ Task 1: primary codex failed, falling back to claude/claude-opus-4-6' | intake-util bridge-notify --from bolt --to ${discord_channel} --metadata '{"step":"fallback-trigger","task_id":1,"agent":"bolt","primary_cli":"codex","fallback_cli":"claude"}' || true
        kubectl delete "coderun/$RUN_NAME" -n "$NS" --ignore-not-found=true &&
        apply_coderun "$FALLBACK_CLI" "$FALLBACK_MODEL" "$FALLBACK_RUN" &&
        wait_coderun "$FALLBACK_RUN" &&
        echo "task-1 implementation complete via fallback ($FALLBACK_CLI/$FALLBACK_MODEL)"
      fi &&
      jq -nc --arg cli "$USED_CLI" --arg model "$USED_MODEL" \
        '{task_id:1, agent:"bolt", cli:$cli, model:$model, phase:"implementation", status:"complete"}'

  - id: security-task-1
    depends_on: [run-task-1]
    command: >
      lobster run --mode tool
      "${tasks_dir}/task-1/security.lobster.yaml"
      --args-json "$(jq -nc --arg td '${tasks_dir}/task-1'
        --arg repo '${repo_url}'
        --arg branch 'task-1/bolt'
        --arg cli 'claude'
        --arg model 'claude-opus-4-6'
        '{task_dir:$td, repo_url:$repo, branch_name:$branch, cli:$cli, model:$model}')"

  - id: gate-task-1
    depends_on: [security-task-1]
    command: |
      echo "task-1 [infra] gate passed — codex/gpt-5.2-codex — all checks complete" &&
      echo '✅ Task 1: Provision Core Infrastructure (Bolt - Kubernete... — gate passed (codex/gpt-5.2-codex)' | intake-util bridge-notify --from bolt --to ${discord_channel} --metadata '{"step":"gate-pass","task_id":1,"agent":"bolt","cli":"codex","model":"gpt-5.2-codex","checks":1}' || true
      LINEAR_SID="${linear_session_id}"
      [ -n "$LINEAR_SID" ] && intake-util linear-activity --session-id "$LINEAR_SID" --type action --body '## ✅ Task 1 Gate Passed\n\n**Provision Core Infrastructure (Bolt - Kubernetes/Helm)**\n- Agent: `bolt` | CLI: `codex`\n- Checks passed: 1 (security-task-1)' >/dev/null || true
      jq -nc '{task_id: 1, task_type: "infra", agent: "bolt", cli: "codex", model: "gpt-5.2-codex", difficulty: 5, gate: "pass"}'

  # ── Task 2: Build Equipment Catalog Service (Rex - Rust/Axum) (task, agent: rex, cli: claude, model: claude-opus-4-6, difficulty: 5) ──
  - id: notify-task-2-start
    depends_on: [gate-task-1]
    command: |
      echo '🚀 Task 2: Build Equipment Catalog Service (Rex - Rust/Axum) → claude (claude-opus-4-6) — agent: rex' | intake-util bridge-notify --from rex --to ${discord_channel} --metadata '{"step":"task-dispatch","task_id":2,"agent":"rex","cli":"claude","model":"claude-opus-4-6","task_type":"task"}' || true
      LINEAR_SID="${linear_session_id}"
      [ -n "$LINEAR_SID" ] && intake-util linear-activity --session-id "$LINEAR_SID" --type action --body '## 🚀 Task 2 Dispatched\n\n**Build Equipment Catalog Service (Rex - Rust/Axum)**\n- Agent: `rex`\n- CLI: `claude` / Model: `claude-opus-4-6`\n- Type: task | Difficulty: 5\n- Subtasks: 12' >/dev/null || true

  - id: run-task-2
    depends_on: [notify-task-2-start]
    command: |
      # --- Primary attempt: claude/claude-opus-4-6 ---
      PRIMARY_CLI="claude"
      PRIMARY_MODEL="claude-opus-4-6"
      FALLBACK_CLI="codex"
      FALLBACK_MODEL="gpt-5.2-codex"
      TASK_ID=2
      AGENT="rex"
      NS="${namespace}"
      RUN_NAME="play-task-2-rex"
      USED_CLI="$PRIMARY_CLI"
      USED_MODEL="$PRIMARY_MODEL"

      apply_coderun() {
        local cli="$1" model="$2" run_name="$3"
        cat <<CODERUN_EOF | envsubst | kubectl apply -f -
      apiVersion: agents.platform/v1
      kind: CodeRun
      metadata:
        name: $run_name
        namespace: $NS
        labels:
          cto.5dlabs.ai/play: "true"
          cto.5dlabs.ai/task-id: "2"
          cto.5dlabs.ai/agent: "rex"
          cto.5dlabs.ai/task-type: "task"
          cto.5dlabs.ai/cli: "$cli"
      spec:
        runType: implementation
        taskId: 2
        service: rex
        repositoryUrl: ${repo_url}
        docsRepositoryUrl: ${docs_repository_url}
        model: $model
        githubApp: 5DLabs-Rex
        enableDocker: ${enable_docker}
        cliConfig:
          cliType: $cli
          model: $model
        linearIntegration:
          enabled: true
          sessionId: ${linear_session_id}
          teamId: ${linear_team_id}
        subtasks:
          - id: 2001
            title: "Initialize Cargo workspace, declare all dependencies, and write sqlx catalog schema migrations"
            parallelizable: false
          - id: 2002
            title: "Implement application entrypoint, AppState, and database/Valkey connection pool setup"
            parallelizable: false
            dependencies: ["2001"]
          - id: 2003
            title: "Implement JWT extraction and validation middleware for admin-protected write endpoints"
            parallelizable: true
            dependencies: ["2002"]
          - id: 2004
            title: "Implement catalog CRUD handlers: categories list and products list/get/create/update"
            parallelizable: false
            dependencies: ["2002", "2003"]
          - id: 2005
            title: "Implement availability calculation logic and GET /availability endpoint with unit tests"
            parallelizable: false
            dependencies: ["2004"]
          - id: 2006
            title: "Implement Valkey sliding-window rate limiter middleware"
            parallelizable: true
            dependencies: ["2002"]
          - id: 2007
            title: "Implement AI agent machine-readable catalog endpoint and programmatic checkout endpoint"
            parallelizable: false
            dependencies: ["2005"]
          - id: 2008
            title: "Implement Prometheus metrics middleware and /metrics endpoint"
            parallelizable: true
            dependencies: ["2002"]
          - id: 2009
            title: "Implement health check endpoints: /health/live and /health/ready"
            parallelizable: true
            dependencies: ["2002"]
          - id: 2010
            title: "Implement internal GDPR export and deletion endpoints"
            parallelizable: true
            dependencies: ["2004"]
          - id: 2011
            title: "Write Dockerfile and Kubernetes Deployment/Service manifests for equipment-catalog"
            parallelizable: true
            dependencies: ["2002"]
          - id: 2012
            title: "Write integration test suite and verify cargo-tarpaulin coverage >= 80%"
            parallelizable: false
            dependencies: ["2005", "2007", "2010"]
      CODERUN_EOF
      }

      wait_coderun() {
        local run_name="$1"
        kubectl wait "coderun/$run_name" -n "$NS" \
          --for=jsonpath='{.status.phase}'=Succeeded \
          --timeout=3600s
      }

      # Primary attempt
      echo "Submitting CodeRun $RUN_NAME ($PRIMARY_CLI/$PRIMARY_MODEL)..." &&
      apply_coderun "$PRIMARY_CLI" "$PRIMARY_MODEL" "$RUN_NAME" &&
      if wait_coderun "$RUN_NAME"; then
        echo "task-2 implementation complete ($PRIMARY_CLI/$PRIMARY_MODEL)"
      else
        # --- Fallback attempt: codex/gpt-5.2-codex ---
        FALLBACK_RUN="play-task-2-rex-fallback"
        USED_CLI="$FALLBACK_CLI"
        USED_MODEL="$FALLBACK_MODEL"
        echo "⚠️ Primary $PRIMARY_CLI failed for task-2, falling back to $FALLBACK_CLI/$FALLBACK_MODEL..." &&
        echo '⚠️ Task 2: primary claude failed, falling back to codex/gpt-5.2-codex' | intake-util bridge-notify --from rex --to ${discord_channel} --metadata '{"step":"fallback-trigger","task_id":2,"agent":"rex","primary_cli":"claude","fallback_cli":"codex"}' || true
        kubectl delete "coderun/$RUN_NAME" -n "$NS" --ignore-not-found=true &&
        apply_coderun "$FALLBACK_CLI" "$FALLBACK_MODEL" "$FALLBACK_RUN" &&
        wait_coderun "$FALLBACK_RUN" &&
        echo "task-2 implementation complete via fallback ($FALLBACK_CLI/$FALLBACK_MODEL)"
      fi &&
      jq -nc --arg cli "$USED_CLI" --arg model "$USED_MODEL" \
        '{task_id:2, agent:"rex", cli:$cli, model:$model, phase:"implementation", status:"complete"}'

  - id: security-task-2
    depends_on: [run-task-2]
    command: >
      lobster run --mode tool
      "${tasks_dir}/task-2/security.lobster.yaml"
      --args-json "$(jq -nc --arg td '${tasks_dir}/task-2'
        --arg repo '${repo_url}'
        --arg branch 'task-2/rex'
        --arg cli 'claude'
        --arg model 'claude-opus-4-6'
        '{task_dir:$td, repo_url:$repo, branch_name:$branch, cli:$cli, model:$model}')"

  - id: quality-task-2
    depends_on: [run-task-2]
    command: >
      lobster run --mode tool
      "${tasks_dir}/task-2/quality.lobster.yaml"
      --args-json "$(jq -nc --arg td '${tasks_dir}/task-2'
        --arg repo '${repo_url}'
        --arg branch 'task-2/rex'
        --arg cli 'claude'
        --arg model 'claude-opus-4-6'
        '{task_dir:$td, repo_url:$repo, branch_name:$branch, cli:$cli, model:$model}')"

  - id: testing-task-2
    depends_on: [run-task-2]
    command: >
      lobster run --mode tool
      "${tasks_dir}/task-2/testing.lobster.yaml"
      --args-json "$(jq -nc --arg td '${tasks_dir}/task-2'
        --arg repo '${repo_url}'
        --arg branch 'task-2/rex'
        --arg cli 'codex'
        --arg model 'gpt-5.2-codex'
        '{task_dir:$td, repo_url:$repo, branch_name:$branch, cli:$cli, model:$model}')"

  - id: gate-task-2
    depends_on: [security-task-2, quality-task-2, testing-task-2]
    command: |
      echo "task-2 [task] gate passed — claude/claude-opus-4-6 — all checks complete" &&
      echo '✅ Task 2: Build Equipment Catalog Service (Rex - Rust/Axum) — gate passed (claude/claude-opus-4-6)' | intake-util bridge-notify --from rex --to ${discord_channel} --metadata '{"step":"gate-pass","task_id":2,"agent":"rex","cli":"claude","model":"claude-opus-4-6","checks":3}' || true
      LINEAR_SID="${linear_session_id}"
      [ -n "$LINEAR_SID" ] && intake-util linear-activity --session-id "$LINEAR_SID" --type action --body '## ✅ Task 2 Gate Passed\n\n**Build Equipment Catalog Service (Rex - Rust/Axum)**\n- Agent: `rex` | CLI: `claude`\n- Checks passed: 3 (security-task-2, quality-task-2, testing-task-2)' >/dev/null || true
      jq -nc '{task_id: 2, task_type: "task", agent: "rex", cli: "claude", model: "claude-opus-4-6", difficulty: 5, gate: "pass"}'

  # ── Task 3: Build Rental Management System Service (Grizz - Go/gRPC) (task, agent: grizz, cli: codex, model: gpt-5.2-codex, difficulty: 5) ──
  - id: notify-task-3-start
    depends_on: [gate-task-1]
    command: |
      echo '🚀 Task 3: Build Rental Management System Service (Grizz -... → codex (gpt-5.2-codex) — agent: grizz' | intake-util bridge-notify --from grizz --to ${discord_channel} --metadata '{"step":"task-dispatch","task_id":3,"agent":"grizz","cli":"codex","model":"gpt-5.2-codex","task_type":"task"}' || true
      LINEAR_SID="${linear_session_id}"
      [ -n "$LINEAR_SID" ] && intake-util linear-activity --session-id "$LINEAR_SID" --type action --body '## 🚀 Task 3 Dispatched\n\n**Build Rental Management System Service (Grizz - Go/gRPC)**\n- Agent: `grizz`\n- CLI: `codex` / Model: `gpt-5.2-codex`\n- Type: task | Difficulty: 5\n- Subtasks: 13' >/dev/null || true

  - id: run-task-3
    depends_on: [notify-task-3-start]
    command: |
      # --- Primary attempt: codex/gpt-5.2-codex ---
      PRIMARY_CLI="codex"
      PRIMARY_MODEL="gpt-5.2-codex"
      FALLBACK_CLI="claude"
      FALLBACK_MODEL="claude-opus-4-6"
      TASK_ID=3
      AGENT="grizz"
      NS="${namespace}"
      RUN_NAME="play-task-3-grizz"
      USED_CLI="$PRIMARY_CLI"
      USED_MODEL="$PRIMARY_MODEL"

      apply_coderun() {
        local cli="$1" model="$2" run_name="$3"
        cat <<CODERUN_EOF | envsubst | kubectl apply -f -
      apiVersion: agents.platform/v1
      kind: CodeRun
      metadata:
        name: $run_name
        namespace: $NS
        labels:
          cto.5dlabs.ai/play: "true"
          cto.5dlabs.ai/task-id: "3"
          cto.5dlabs.ai/agent: "grizz"
          cto.5dlabs.ai/task-type: "task"
          cto.5dlabs.ai/cli: "$cli"
      spec:
        runType: implementation
        taskId: 3
        service: grizz
        repositoryUrl: ${repo_url}
        docsRepositoryUrl: ${docs_repository_url}
        model: $model
        githubApp: 5DLabs-Grizz
        enableDocker: ${enable_docker}
        cliConfig:
          cliType: $cli
          model: $model
        linearIntegration:
          enabled: true
          sessionId: ${linear_session_id}
          teamId: ${linear_team_id}
        subtasks:
          - id: 3001
            title: "Initialize Go module and dependency manifest for RMS service"
            parallelizable: false
          - id: 3002
            title: "Define protobuf schemas for all five RMS domains"
            parallelizable: false
            dependencies: ["3001"]
          - id: 3003
            title: "Write database migrations for all seven RMS schema tables"
            parallelizable: true
            dependencies: ["3001"]
          - id: 3004
            title: "Implement OpportunityService gRPC handlers with REST gateway"
            parallelizable: false
            dependencies: ["3002", "3003"]
          - id: 3005
            title: "Implement ProjectService gRPC handlers including CheckOut and CheckIn"
            parallelizable: true
            dependencies: ["3002", "3003"]
          - id: 3006
            title: "Implement InventoryService with atomic conflict detection and unit tests"
            parallelizable: true
            dependencies: ["3002", "3003"]
          - id: 3007
            title: "Implement CrewService and DeliveryService gRPC handlers"
            parallelizable: true
            dependencies: ["3002", "3003"]
          - id: 3008
            title: "Implement ScoreLead algorithm with external vetting service HTTP call and unit tests"
            parallelizable: false
            dependencies: ["3004"]
          - id: 3009
            title: "Implement Google Calendar integration triggered on project confirmation"
            parallelizable: false
            dependencies: ["3005"]
          - id: 3010
            title: "Add Prometheus metrics and health endpoints on dedicated port 8081"
            parallelizable: true
            dependencies: ["3004"]
          - id: 3011
            title: "Implement GDPR export and delete endpoints"
            parallelizable: true
            dependencies: ["3004"]
          - id: 3012
            title: "Write Kubernetes Deployment and Service manifests for RMS"
            parallelizable: true
            dependencies: ["3010"]
          - id: 3013
            title: "Write integration tests for RMS service end-to-end flows"
            parallelizable: false
            dependencies: ["3004", "3005", "3006", "3011"]
      CODERUN_EOF
      }

      wait_coderun() {
        local run_name="$1"
        kubectl wait "coderun/$run_name" -n "$NS" \
          --for=jsonpath='{.status.phase}'=Succeeded \
          --timeout=3600s
      }

      # Primary attempt
      echo "Submitting CodeRun $RUN_NAME ($PRIMARY_CLI/$PRIMARY_MODEL)..." &&
      apply_coderun "$PRIMARY_CLI" "$PRIMARY_MODEL" "$RUN_NAME" &&
      if wait_coderun "$RUN_NAME"; then
        echo "task-3 implementation complete ($PRIMARY_CLI/$PRIMARY_MODEL)"
      else
        # --- Fallback attempt: claude/claude-opus-4-6 ---
        FALLBACK_RUN="play-task-3-grizz-fallback"
        USED_CLI="$FALLBACK_CLI"
        USED_MODEL="$FALLBACK_MODEL"
        echo "⚠️ Primary $PRIMARY_CLI failed for task-3, falling back to $FALLBACK_CLI/$FALLBACK_MODEL..." &&
        echo '⚠️ Task 3: primary codex failed, falling back to claude/claude-opus-4-6' | intake-util bridge-notify --from grizz --to ${discord_channel} --metadata '{"step":"fallback-trigger","task_id":3,"agent":"grizz","primary_cli":"codex","fallback_cli":"claude"}' || true
        kubectl delete "coderun/$RUN_NAME" -n "$NS" --ignore-not-found=true &&
        apply_coderun "$FALLBACK_CLI" "$FALLBACK_MODEL" "$FALLBACK_RUN" &&
        wait_coderun "$FALLBACK_RUN" &&
        echo "task-3 implementation complete via fallback ($FALLBACK_CLI/$FALLBACK_MODEL)"
      fi &&
      jq -nc --arg cli "$USED_CLI" --arg model "$USED_MODEL" \
        '{task_id:3, agent:"grizz", cli:$cli, model:$model, phase:"implementation", status:"complete"}'

  - id: security-task-3
    depends_on: [run-task-3]
    command: >
      lobster run --mode tool
      "${tasks_dir}/task-3/security.lobster.yaml"
      --args-json "$(jq -nc --arg td '${tasks_dir}/task-3'
        --arg repo '${repo_url}'
        --arg branch 'task-3/grizz'
        --arg cli 'claude'
        --arg model 'claude-opus-4-6'
