name: implement-task-8
metadata:
  task_id: 8
  agent: blaze
  stack: Next.js 15/React 19/TailwindCSS 4/Effect 3.x
  cli: cursor
  model: opus-4.6
  depends_on_tasks: [2, 7]

args:
  task_dir: {}
  repo_url: {}
  branch_name:
    default: "task-8/feature-branch"
  agent:
    default: "blaze"
  cli:
    default: "cursor"
  model:
    default: "opus-4.6"
  fallback_cli:
    default: "claude"
  fallback_model:
    default: "claude-opus-4-6"
  max_implementation_retries:
    default: 10
  max_quality_retries:
    default: 5

steps:
  - id: setup
    command: >
      git clone ${repo_url} work && cd work &&
      git checkout -b ${branch_name}

  - id: implement-subtask-8001
    depends_on: [setup]
    retry: { max: "${max_implementation_retries}" }
    command: >
      ${cli} -p "$(cat ${task_dir}/subtasks/task-8.8001/prompt.md)" --model ${model}

  - id: validate-subtask-8001
    depends_on: [implement-subtask-8001]
    retry: { max: "${max_quality_retries}" }
    command: >
      cd work && bun tsc --noEmit && bun test && bun lint

  - id: implement-subtask-8002
    depends_on: [validate-subtask-8001]
    retry: { max: "${max_implementation_retries}" }
