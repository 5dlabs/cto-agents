name: implement-task-3
metadata:
  task_id: 3
  agent: grizz
  stack: Go 1.22+/gRPC/grpc-gateway
  cli: codex
  model: gpt-5.2-codex
  depends_on_tasks: [1]

args:
  task_dir: {}
  repo_url: {}
  branch_name:
    default: "task-3/feature-branch"
  agent:
    default: "grizz"
  cli:
    default: "codex"
  model:
    default: "gpt-5.2-codex"
  fallback_cli:
    default: "claude"
  fallback_model:
    default: "claude-opus-4-6"
  max_implementation_retries:
    default: 10
  max_quality_retries:
    default: 5

steps:
