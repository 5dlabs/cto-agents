# Skill Mappings Configuration
# Maps agents to their default and job-type-specific skills
#
# Skills are loaded based on:
# 1. Default skills - always loaded for the agent
# 2. Job-type skills - merged with defaults based on run_type
# 3. Optional skills - loaded based on triggers or explicit request (future)
#
# Job types: coder, healer, intake, quality, test, deploy, security, review, integration
#
# For Claude Code, Factory, OpenCode, Codex: skills are copied to native skill directories
# For other CLIs: skill content is baked into AGENTS.md

