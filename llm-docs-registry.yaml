# LLM Documentation Registry
# Maps libraries to their llms.txt endpoints for enriched agent context
#
# The llms.txt standard (https://llmstxt.org/) provides LLM-optimized documentation
# that agents can fetch for up-to-date API references and architecture overviews.
#
# Usage:
# 1. Skills reference entries here via the `llm_docs` frontmatter field
# 2. Agents can fetch llms.txt content using Firecrawl when needed
# 3. Build-time caching can pre-fetch content for offline availability

# ============================================================================
# FRONTEND LIBRARIES
# ============================================================================

shadcn:
  name: shadcn/ui
  description: Beautifully designed, accessible components built with Radix UI and Tailwind CSS
  llms_txt: https://ui.shadcn.com/llms.txt
  context7_id: /shadcn-ui/ui
